name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Minimal permissions — CI only needs to read code and post check results
permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check wx_monitor/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cartopy needs GEOS / PROJ system libraries
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgeos-dev libproj-dev proj-data proj-bin \
            libeccodes-dev libhdf5-dev libnetcdf-dev

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # Optional: run all products on a scheduled basis
  scheduled-run:
    name: Scheduled product run
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgeos-dev libproj-dev proj-data proj-bin \
            libeccodes-dev libhdf5-dev libnetcdf-dev
      - name: Install Python dependencies
        run: pip install -r requirements.txt && pip install -e .
      - name: Run wx-monitor
        run: python -m wx_monitor --output-dir output/
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wx-monitor-output
          path: output/
          retention-days: 3
